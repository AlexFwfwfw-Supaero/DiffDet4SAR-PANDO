_BASE_: "Base-DiffusionDet.yaml"

MODEL:
  WEIGHTS: "detectron2://ImageNetPretrained/torchvision/R-50.pkl"  # overridden per script
  RESNETS:
    DEPTH: 50
    STRIDE_IN_1X1: False
  DiffusionDet:
    NUM_PROPOSALS: 500
    NUM_CLASSES: 10      # 10 military vehicle classes

DATASETS:
  TRAIN: ("atrnet_military_train",)
  TEST:  ("atrnet_military_test",)

SOLVER:
  IMS_PER_BATCH: 8
  BASE_LR: 0.00002
  # ~3 671 train images → epochs ≈ iterations * 8 / 3671
  # 30 000 iters ≈ 65 epochs (fine-tune); 60 000 iters ≈ 131 epochs (scratch)
  # Overridden per SLURM script via MODEL.WEIGHTS / SOLVER.MAX_ITER overrides.
  STEPS: (20000, 26000)
  MAX_ITER: 30000
  WARMUP_FACTOR: 0.001
  WARMUP_ITERS: 500
  WEIGHT_DECAY: 0.0001
  OPTIMIZER: "ADAMW"
  CHECKPOINT_PERIOD: 5000

INPUT:
  MIN_SIZE_TRAIN: (800, 1000, 1200)
  MIN_SIZE_TEST: 1000
  CROP:
    ENABLED: False
  FORMAT: "RGB"

TEST:
  EVAL_PERIOD: 5000

DATALOADER:
  NUM_WORKERS: 4
  FILTER_EMPTY_ANNOTATIONS: True

OUTPUT_DIR: "./output_military"
